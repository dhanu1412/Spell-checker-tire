<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spell Checker Mini Project</title>
    <style>
        :root { --primary: #4a90e2; --success: #27ae60; --error: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: #333; text-align: center; margin-bottom: 25px; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 15px; }
        .stats-bar { display: flex; justify-content: space-around; margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 20px; font-weight: bold; color: var(--primary); }
        #resultArea { margin-top: 25px; line-height: 1.8; font-size: 18px; min-height: 50px; border-top: 1px solid #eee; padding-top: 15px; }
        .word-correct { color: var(--success); }
        .word-incorrect { color: var(--error); text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>📝 Spell Checker Interface</h1>
    <textarea id="userInput" placeholder="Enter text to check..."></textarea>
    <button onclick="analyze()">Analyze Accuracy</button>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-value" id="totalWords">0</span>
            <span class="stat-label">TOTAL WORDS</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="accuracy">0%</span>
            <span class="stat-label">ACCURACY</span>
        </div>
    </div>

    <div id="resultArea"></div>
</div>

<script>
    async function analyze() {
        const text = document.getElementById('userInput').value.trim();
        if (!text) return alert("Please enter text!");

        const words = text.split(/\s+/);
        const resultArea = document.getElementById('resultArea');
        resultArea.innerHTML = "Processing...";

        let correctCount = 0;
        let htmlOutput = "";

        for (let word of words) {
            try {
                const response = await fetch('/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: word })
                });
                const data = await response.json();

                if (data.correct) {
                    correctCount++;
                    htmlOutput += `<span class="word-correct">${word}</span> `;
                } else {
                    htmlOutput += `<span class="word-incorrect">${word}</span> `;
                }
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('totalWords').innerText = words.length;
        document.getElementById('accuracy').innerText = ((correctCount / words.length) * 100).toFixed(1) + "%";
        resultArea.innerHTML = htmlOutput;
    }
</script>

</body>
</html>
